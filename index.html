<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSL BBX League｜花園陀螺道場 正取名單</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#0A0A0D;
    --panel:#15161C;
    --ink:#ECEDF2;
    --ink-soft:#8A8D99;
    --line:#2A2C36;
    --lane-blue:#3AC7FF;
    --lane-red:#FF3B5C;
    --lane-gold:#F0C143;
    --lane-green:#39FF88;
    --confirm:#F0C143;
    --backup:#FF3B5C;
    --danger:#FF3B5C;
    --arena:#050506;
    --arena-gold:#F0C143;
    --glow-cyan:0 0 10px rgba(58,199,255,0.35);
    --glow-gold:0 0 12px rgba(240,193,67,0.30);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 0%, rgba(58,199,255,0.06), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(240,193,67,0.05), transparent 40%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 34px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 34px),
      var(--paper);
    color:var(--ink);
    font-family:'Noto Sans TC',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .num{font-family:'Oswald',sans-serif;}

  header{
    background:
      radial-gradient(circle at 90% -20%, rgba(240,193,67,0.18), transparent 55%),
      var(--arena);
    color:var(--ink);
    padding:18px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
    border-bottom:1px solid var(--arena-gold);
    box-shadow:0 2px 20px rgba(240,193,67,0.15);
  }
  header .brand{ display:flex; align-items:center; gap:14px; cursor:pointer; }
  header .brand img{
    width:78px; height:78px; display:block;
    filter:drop-shadow(0 0 6px rgba(240,193,67,0.35));
  }
  header .brand .titles{ display:flex; flex-direction:column; gap:2px; }
  header .brand .eyebrow{
    font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:3px;
    color:var(--arena-gold); text-transform:uppercase;
  }
  header h1{ font-size:30px; margin:0; font-weight:900; letter-spacing:1px; }
  header .brand .sub{ font-size:12px; color:rgba(244,241,230,0.7); letter-spacing:0.5px; }
  header nav{ display:flex; gap:8px; }
  header nav button{
    background:transparent; border:1px solid rgba(240,193,67,0.5); color:var(--arena-gold);
    font-family:'Noto Sans TC',sans-serif; font-size:13px; padding:7px 14px; border-radius:3px; cursor:pointer;
  }
  header nav button:hover{ background:rgba(240,193,67,0.12); border-color:var(--arena-gold); }

  main{ max-width:920px; margin:0 auto; padding:28px 20px 80px; }

  .crumbs{ display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--ink-soft); margin-bottom:16px; }
  .crumbs button{
    background:none; border:none; color:var(--confirm); font-family:'Noto Sans TC',sans-serif;
    font-size:12.5px; cursor:pointer; padding:0; text-decoration:underline;
  }

  .search{ display:flex; gap:10px; margin-bottom:22px; }
  .search input{
    flex:1; padding:10px 14px; border:1px solid var(--line); border-radius:3px;
    font-family:'Noto Sans TC',sans-serif; font-size:14px; background:var(--panel); color:var(--ink);
  }
  .search input::placeholder{ color:var(--ink-soft); }
  .search input:focus{ outline:none; border-color:var(--lane-blue); box-shadow:var(--glow-cyan); }

  .type-chip{
    display:inline-block; font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px;
    padding:2px 8px; border-radius:10px; margin-left:8px; vertical-align:middle;
  }
  .type-chip.individual{ background:rgba(58,199,255,0.14); color:var(--lane-blue); border:1px solid rgba(58,199,255,0.3); }
  .type-chip.team{ background:rgba(240,193,67,0.14); color:var(--lane-gold); border:1px solid rgba(240,193,67,0.3); }

  .event-card{
    background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--arena-gold);
    border-radius:4px; margin-bottom:14px; padding:16px 18px;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    cursor:pointer; transition:box-shadow .15s ease, border-color .15s ease, transform .1s ease;
  }
  .event-card:hover{ box-shadow:0 0 0 1px rgba(240,193,67,0.35), 0 8px 24px rgba(240,193,67,0.12); border-left-color:var(--lane-blue); transform:translateY(-1px); }
  .event-card .ev-name{ font-size:17px; font-weight:700; margin:0 0 4px; color:var(--ink); }
  .event-card .ev-date{ font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:1.5px; color:var(--ink-soft); }
  .event-card .ev-meta{ font-size:12px; color:var(--ink-soft); margin-top:4px; }
  .event-card .go{
    font-family:'Oswald',sans-serif; color:var(--arena); background:var(--arena-gold);
    padding:8px 14px; border-radius:3px; font-size:12px; letter-spacing:1px; white-space:nowrap; font-weight:700;
  }

  .section-block{ margin-bottom:26px; }
  .section-title{
    font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:2px; text-transform:uppercase;
    color:var(--ink); margin:0 0 12px; padding-bottom:8px; border-bottom:2px solid var(--line);
    display:flex; align-items:center; gap:8px;
  }
  .section-title .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; }
  .section-title.main .dot{ background:var(--confirm); }
  .section-title.backup .dot{ background:var(--backup); }

  .team-card{
    background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--lane-blue);
    border-radius:4px; margin-bottom:14px; overflow:hidden;
  }
  .team-card.is-backup{ border-left-style:dashed; border-left-color:var(--backup); }
  .team-card .team-head{ display:flex; align-items:center; gap:12px; padding:12px 18px; border-bottom:1px solid var(--line); }
  .team-card .lane{ font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:1px; color:var(--lane-blue); }
  .team-card.is-backup .lane{ color:var(--backup); }
  .team-card h3{ margin:0; font-size:16px; font-weight:700; color:var(--ink); }
  .team-body{ padding:14px 18px 16px; }
  .bibs{ display:flex; flex-wrap:wrap; gap:8px; }
  .bib{
    display:flex; align-items:center; gap:6px; background:var(--confirm); color:#1A1305; font-weight:600;
    padding:6px 10px 6px 8px; border-radius:3px; font-size:13px; box-shadow:var(--glow-gold);
  }
  .team-card.is-backup .bib{ background:transparent; color:var(--ink); border:1px dashed var(--backup); box-shadow:none; }
  .bib .bib-num{ font-family:'Oswald',sans-serif; font-size:12px; background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:2px; }
  .team-card.is-backup .bib .bib-num{ background:rgba(255,59,92,0.15); color:var(--backup); }

  .backup-list{ display:flex; flex-wrap:wrap; gap:8px; }
  .backup-chip{ font-size:12.5px; color:var(--ink-soft); border:1px dashed var(--backup); padding:4px 9px; border-radius:12px; }
  .empty-note{ color:var(--ink-soft); font-size:13px; }
  .event-title-block{ margin-bottom:18px; }
  .event-title-block h2{ margin:0 0 4px; font-size:22px; display:inline-block; color:var(--ink); }
  .event-title-block .date{ font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:1.5px; color:var(--ink-soft); }

  footer.pagefoot{ text-align:center; padding:20px; color:var(--ink-soft); font-size:12px; }

  /* Admin */
  .admin-wrap{ max-width:780px; margin:0 auto; padding:28px 20px 80px; }
  .gate{ max-width:340px; margin:80px auto; background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:26px; text-align:center; box-shadow:0 0 24px rgba(0,0,0,0.4); }
  .gate h2{ margin-top:0; font-size:16px; color:var(--ink); }
  .gate input{ width:100%; padding:10px; border:1px solid var(--line); border-radius:3px; margin-bottom:12px; font-size:14px; background:var(--paper); color:var(--ink); }
  .gate input:focus{ outline:none; border-color:var(--lane-blue); box-shadow:var(--glow-cyan); }
  .btn{
    font-family:'Noto Sans TC',sans-serif; background:var(--lane-blue); color:#031018; border:none;
    padding:9px 16px; border-radius:3px; font-size:13px; cursor:pointer; font-weight:700;
  }
  .btn:hover{ box-shadow:var(--glow-cyan); }
  .btn.secondary{ background:transparent; color:var(--ink); border:1px solid var(--line); }
  .btn.secondary:hover{ border-color:var(--ink-soft); box-shadow:none; }
  .btn.danger{ background:var(--danger); color:#1A0509; }
  .btn.danger.confirming{ background:#7A1428; color:#fff; }
  .btn.gold{ background:var(--lane-gold); color:#1A1305; }
  .btn.gold:hover{ box-shadow:var(--glow-gold); }
  .btn.small{ padding:6px 11px; font-size:12px; }

  .admin-toolbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px; }

  .admin-event{ background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:14px 18px; margin-bottom:14px; }
  .admin-event .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .admin-event input[type=text]{ flex:2; min-width:150px; padding:8px 10px; border:1px solid var(--line); border-radius:3px; font-size:14px; font-weight:700; background:var(--paper); color:var(--ink); }
  .admin-event input[type=date]{ flex:1; min-width:140px; padding:8px 10px; border:1px solid var(--line); border-radius:3px; font-size:14px; font-family:'Oswald',sans-serif; background:var(--paper); color:var(--ink); }
  .admin-event select{ flex:1; min-width:110px; padding:8px 10px; border:1px solid var(--line); border-radius:3px; font-size:13px; font-family:'Noto Sans TC',sans-serif; background:var(--paper); color:var(--ink); }
  .admin-event .actions{ display:flex; gap:8px; margin-left:auto; }

  .type-select-row{ display:flex; gap:10px; margin-bottom:16px; }
  .type-select-row label{
    flex:1; border:1px solid var(--line); border-radius:4px; padding:10px 12px; cursor:pointer;
    font-size:13px; display:flex; align-items:center; gap:8px; background:var(--panel); color:var(--ink);
  }
  .type-select-row input{ accent-color:var(--lane-blue); }

  .admin-list-editor{ margin-bottom:16px; }
  .col label.field-label{
    display:block; font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1.5px;
    color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase;
  }
  textarea.roster-input{
    width:100%; min-height:110px; padding:8px 10px; border:1px solid var(--line); border-radius:3px;
    font-family:'Noto Sans TC',sans-serif; font-size:13px; resize:vertical; background:var(--paper); color:var(--ink);
  }
  textarea.roster-input:focus, .admin-event input:focus, .admin-team input:focus{ outline:none; border-color:var(--lane-blue); box-shadow:var(--glow-cyan); }
  .cols{ display:flex; gap:14px; flex-wrap:wrap; }
  .col{ flex:1; min-width:220px; }

  .admin-subsection{ margin-bottom:22px; }
  .admin-subsection > .sub-head{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;
  }
  .admin-subsection > .sub-head h4{ margin:0; font-size:13px; letter-spacing:1px; font-family:'Oswald',sans-serif; text-transform:uppercase; color:var(--ink-soft); }

  .admin-team{ background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:14px 16px; margin-bottom:12px; }
  .admin-team .row{ display:flex; gap:10px; align-items:center; margin-bottom:10px; }
  .admin-team input[type=text]{ flex:1; padding:8px 10px; border:1px solid var(--line); border-radius:3px; font-size:14px; font-weight:700; background:var(--paper); color:var(--ink); }

  .save-bar{ position:sticky; bottom:0; background:var(--paper); padding:14px 0; display:flex; justify-content:flex-end; gap:10px; border-top:1px solid var(--line); }
  .status-msg{ font-size:12.5px; color:var(--lane-green); align-self:center; margin-right:auto; }
  .hidden{ display:none !important; }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const ADMIN_PASSWORD = "55688TSL";
const STORAGE_KEY = "bbx-roster-data-v2";

const SUPABASE_URL = "https://teymozsbdsmxnxziizoy.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_E-CJugu7OssxJK3QQFkKjA_jMc-Ll0E";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const LANE_COLORS = ["var(--lane-blue)","var(--lane-red)","var(--lane-gold)","var(--lane-green)"];

let state = { events: [], updatedAt: null };
let editingState = null;
let currentEventId = null;
let currentAdminEventId = null;

// ---------- storage (Supabase) ----------
async function loadData(){
  try{
    const { data, error } = await sb
      .from('roster_data')
      .select('value')
      .eq('key', STORAGE_KEY)
      .maybeSingle();
    if(error) throw error;
    if(data && data.value){
      state = data.value;
    } else {
      state = seedData();
      const { error: insertError } = await sb
        .from('roster_data')
        .upsert({ key: STORAGE_KEY, value: state, updated_at: new Date().toISOString() });
      if(insertError) throw insertError;
    }
  }catch(e){
    console.error('讀取資料失敗，改用預設範例資料', e);
    state = seedData();
  }
  renderEventList();
}

async function persist(newState){
  newState.updatedAt = new Date().toISOString();
  const { error } = await sb
    .from('roster_data')
    .upsert({ key: STORAGE_KEY, value: newState, updated_at: newState.updatedAt });
  if(error) throw error;
  state = JSON.parse(JSON.stringify(newState));
}

function seedData(){
  return {
    updatedAt: null,
    events: [
      {
        id: cryptoId(), name:"個人賽", date:"2026-07-17", type:"individual",
        individualMain:["王小明","陳曉華","林志豪","黃美玲"],
        individualBackup:["張家豪","李佳穎"],
        mainTeams:[], backupTeams:[]
      },
      {
        id: cryptoId(), name:"王牌團體賽", date:"2026-07-24", type:"team",
        individualMain:[], individualBackup:[],
        mainTeams:[
          { id: cryptoId(), name:"A隊", members:["吳承恩","趙雅婷","周子瑜"] },
          { id: cryptoId(), name:"B隊", members:["蔡依林","林俊傑","五月天"] }
        ],
        backupTeams:[
          { id: cryptoId(), name:"C隊", members:["張惠妹","周杰倫"] }
        ]
      }
    ]
  };
}
function cryptoId(){ return 'id' + Math.random().toString(36).slice(2,9); }
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s){ return escapeHtml(s).replace(/"/g,'&quot;'); }
function fmtDate(d){
  if(!d) return "日期未定";
  try{ return new Date(d+"T00:00:00").toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit'}); }
  catch(e){ return d; }
}
function typeLabel(t){ return t === 'team' ? '團體賽' : '個人賽'; }

// ---------- PUBLIC: event list ----------
function renderEventList(filter){
  const wrap = document.getElementById('eventListWrap');
  const q = (filter||"").trim().toLowerCase();
  wrap.innerHTML = "";

  const events = [...state.events]
    .filter(e=>!q || e.name.toLowerCase().includes(q) || (e.date||"").includes(q))
    .sort((a,b)=> (b.date||"").localeCompare(a.date||""));

  if(events.length===0){
    wrap.innerHTML = `<p class="empty-note">目前沒有符合條件的賽事。</p>`;
  }

  events.forEach(ev=>{
    let meta;
    if(ev.type === 'team'){
      const teamCount = ev.mainTeams.length;
      const playerCount = ev.mainTeams.reduce((n,t)=>n+t.members.length,0);
      meta = `${teamCount} 隊・共 ${playerCount} 位正取選手`;
    } else {
      meta = `${ev.individualMain.length} 位正取選手`;
    }
    const card = document.createElement('div');
    card.className = 'event-card';
    card.innerHTML = `
      <div>
        <p class="ev-name">${escapeHtml(ev.name)} <span class="type-chip ${ev.type==='team'?'team':'individual'}">${typeLabel(ev.type)}</span></p>
        <span class="ev-date num">${fmtDate(ev.date)}</span>
        <p class="ev-meta">${meta}</p>
      </div>
      <span class="go">查看名單 →</span>
    `;
    card.addEventListener('click', ()=> openEventDetail(ev.id));
    wrap.appendChild(card);
  });

  const foot = document.getElementById('publicFooter');
  foot.textContent = "最後更新時間：" + (state.updatedAt ? new Date(state.updatedAt).toLocaleString('zh-TW') : "尚未更新");
}

// ---------- PUBLIC: event detail ----------
function openEventDetail(id){
  currentEventId = id;
  const ev = state.events.find(e=>e.id===id);
  if(!ev) return showEventList();
  document.getElementById('detailEventName').textContent = ev.name;
  const chip = document.getElementById('detailEventType');
  chip.textContent = typeLabel(ev.type);
  chip.className = 'type-chip ' + (ev.type==='team' ? 'team' : 'individual');
  document.getElementById('detailEventDate').textContent = fmtDate(ev.date);
  document.getElementById('teamSearchInput').value = "";
  renderRosterDisplay(ev, "");
  document.getElementById('publicEventList').classList.add('hidden');
  document.getElementById('publicEventDetail').classList.remove('hidden');
}

function renderRosterDisplay(ev, filter){
  const wrap = document.getElementById('rosterDisplay');
  const q = (filter||"").trim().toLowerCase();
  wrap.innerHTML = "";

  if(ev.type === 'individual'){
    const main = ev.individualMain.filter(n=>!q || n.toLowerCase().includes(q));
    const backup = ev.individualBackup.filter(n=>!q || n.toLowerCase().includes(q));

    const mainBibs = main.map((n,idx)=>`<div class="bib"><span class="bib-num">${String(idx+1).padStart(2,'0')}</span>${escapeHtml(n)}</div>`).join('');
    const backupChips = backup.map(n=>`<span class="backup-chip">${escapeHtml(n)}</span>`).join('');

    wrap.innerHTML = `
      <div class="section-block">
        <p class="section-title main"><span class="dot"></span>正取名單（${main.length}）</p>
        <div class="bibs">${mainBibs || '<span class="empty-note">尚未設定正取名單</span>'}</div>
      </div>
      <div class="section-block">
        <p class="section-title backup"><span class="dot"></span>備取名單（${backup.length}）</p>
        <div class="backup-list">${backupChips || '<span class="empty-note">尚無備取名單</span>'}</div>
      </div>
    `;
    return;
  }

  // team event
  function matchesTeam(t){
    if(!q) return true;
    if(t.name.toLowerCase().includes(q)) return true;
    return t.members.some(n=>n.toLowerCase().includes(q));
  }
  const mainTeams = ev.mainTeams.filter(matchesTeam);
  const backupTeams = ev.backupTeams.filter(matchesTeam);

  function teamCardHtml(t, idx, isBackup){
    const bibs = t.members.map((n,i)=>`<div class="bib"><span class="bib-num">${String(i+1).padStart(2,'0')}</span>${escapeHtml(n)}</div>`).join('');
    return `
      <div class="team-card ${isBackup?'is-backup':''}">
        <div class="team-head">
          <span class="lane num">${isBackup?'BACKUP':'LANE'} ${String(idx+1).padStart(2,'0')}</span>
          <h3>${escapeHtml(t.name)}</h3>
        </div>
        <div class="team-body">
          <div class="bibs">${bibs || '<span class="empty-note">尚未設定名單</span>'}</div>
        </div>
      </div>
    `;
  }

  let html = `<div class="section-block">
      <p class="section-title main"><span class="dot"></span>正取隊伍（${mainTeams.length}）</p>
      ${mainTeams.length ? mainTeams.map((t,i)=>teamCardHtml(t,i,false)).join('') : '<p class="empty-note">尚未設定正取隊伍</p>'}
    </div>
    <div class="section-block">
      <p class="section-title backup"><span class="dot"></span>備取隊伍（${backupTeams.length}）</p>
      ${backupTeams.length ? backupTeams.map((t,i)=>teamCardHtml(t,i,true)).join('') : '<p class="empty-note">尚無備取隊伍</p>'}
    </div>`;
  wrap.innerHTML = html;
}

function showEventList(){
  currentEventId = null;
  document.getElementById('publicEventDetail').classList.add('hidden');
  document.getElementById('publicEventList').classList.remove('hidden');
  renderEventList(document.getElementById('eventSearchInput').value);
}

// ---------- ADMIN: event list ----------
function renderAdminEventList(){
  const wrap = document.getElementById('adminEventListWrap');
  wrap.innerHTML = "";
  editingState.events
    .slice()
    .sort((a,b)=> (b.date||"").localeCompare(a.date||""))
    .forEach(ev=>{
      const div = document.createElement('div');
      div.className = 'admin-event';
      div.innerHTML = `
        <div class="row">
          <input type="text" value="${escapeAttr(ev.name)}" data-field="name" data-id="${ev.id}" placeholder="賽事名稱">
          <input type="date" value="${escapeAttr(ev.date||'')}" data-field="date" data-id="${ev.id}">
          <select data-field="type" data-id="${ev.id}">
            <option value="individual" ${ev.type==='individual'?'selected':''}>個人賽</option>
            <option value="team" ${ev.type==='team'?'selected':''}>團體賽</option>
          </select>
          <div class="actions">
            <button class="btn secondary" data-action="manage" data-id="${ev.id}">管理名單</button>
            <button class="btn danger" data-action="delete-event" data-id="${ev.id}">刪除</button>
          </div>
        </div>
      `;
      wrap.appendChild(div);
    });

  wrap.querySelectorAll('[data-field="name"]').forEach(el=>{
    el.addEventListener('input', e=>{
      const ev = editingState.events.find(x=>x.id===e.target.dataset.id);
      if(ev) ev.name = e.target.value;
    });
  });
  wrap.querySelectorAll('[data-field="date"]').forEach(el=>{
    el.addEventListener('input', e=>{
      const ev = editingState.events.find(x=>x.id===e.target.dataset.id);
      if(ev) ev.date = e.target.value;
    });
  });
  wrap.querySelectorAll('[data-field="type"]').forEach(el=>{
    el.addEventListener('change', e=>{
      const ev = editingState.events.find(x=>x.id===e.target.dataset.id);
      if(ev) ev.type = e.target.value;
    });
  });
  wrap.querySelectorAll('[data-action="delete-event"]').forEach(el=>{
    el.addEventListener('click', e=>{
      const btn = e.currentTarget;
      if(btn.dataset.confirming === 'true'){
        const id = btn.dataset.id;
        editingState.events = editingState.events.filter(x=>x.id!==id);
        renderAdminEventList();
        return;
      }
      btn.dataset.confirming = 'true';
      const original = btn.textContent;
      btn.textContent = '再按一次確認';
      btn.classList.add('confirming');
      setTimeout(()=>{
        if(btn.isConnected){
          btn.dataset.confirming = 'false';
          btn.textContent = original;
          btn.classList.remove('confirming');
        }
      }, 3000);
    });
  });
  wrap.querySelectorAll('[data-action="manage"]').forEach(el=>{
    el.addEventListener('click', e=>{
      openRosterEditor(e.target.dataset.id);
    });
  });
}

function showStatus(elId, msg, isError){
  const el = document.getElementById(elId);
  el.textContent = msg;
  el.style.color = isError ? "var(--danger)" : "var(--lane-green)";
  setTimeout(()=>{ if(el.textContent===msg) el.textContent=""; }, 3500);
}

// ---------- ADMIN: roster editor ----------
function openRosterEditor(eventId){
  currentAdminEventId = eventId;
  const ev = editingState.events.find(e=>e.id===eventId);
  if(!ev) return;
  document.getElementById('editorEventName').textContent = ev.name + (ev.date ? "　" + fmtDate(ev.date) : "");
  const chip = document.getElementById('editorEventType');
  chip.textContent = typeLabel(ev.type);
  chip.className = 'type-chip ' + (ev.type==='team' ? 'team' : 'individual');

  if(ev.type === 'individual'){
    document.getElementById('individualEditor').classList.remove('hidden');
    document.getElementById('teamEditor').classList.add('hidden');
    document.getElementById('individualMainInput').value = ev.individualMain.join('\n');
    document.getElementById('individualBackupInput').value = ev.individualBackup.join('\n');
  } else {
    document.getElementById('individualEditor').classList.add('hidden');
    document.getElementById('teamEditor').classList.remove('hidden');
    renderTeamGroupEditor(ev, 'mainTeams', 'mainTeamsWrap');
    renderTeamGroupEditor(ev, 'backupTeams', 'backupTeamsWrap');
  }

  document.getElementById('adminEventList').classList.add('hidden');
  document.getElementById('adminRosterEditor').classList.remove('hidden');
}

function renderTeamGroupEditor(ev, groupKey, wrapId){
  const wrap = document.getElementById(wrapId);
  wrap.innerHTML = "";
  ev[groupKey].forEach(t=>{
    const div = document.createElement('div');
    div.className = 'admin-team';
    div.innerHTML = `
      <div class="row">
        <input type="text" value="${escapeAttr(t.name)}" data-field="name" data-id="${t.id}">
        <button class="btn danger small" data-action="delete-team" data-id="${t.id}">刪除隊伍</button>
      </div>
      <label class="field-label">隊員名單（每行一位）</label>
      <textarea class="roster-input" data-field="members" data-id="${t.id}">${escapeHtml(t.members.join('\n'))}</textarea>
    `;
    wrap.appendChild(div);
  });

  wrap.querySelectorAll('[data-action="delete-team"]').forEach(el=>{
    el.addEventListener('click', e=>{
      const btn = e.currentTarget;
      if(btn.dataset.confirming === 'true'){
        syncTeamGroupFromDOM(ev, groupKey, wrapId);
        const id = btn.dataset.id;
        ev[groupKey] = ev[groupKey].filter(t=>t.id!==id);
        renderTeamGroupEditor(ev, groupKey, wrapId);
        return;
      }
      btn.dataset.confirming = 'true';
      btn.textContent = '再按一次確認';
      btn.classList.add('confirming');
      setTimeout(()=>{
        if(btn.isConnected){
          btn.dataset.confirming = 'false';
          btn.textContent = '刪除隊伍';
          btn.classList.remove('confirming');
        }
      }, 3000);
    });
  });
}

// Reads every team block currently in the DOM (name + members) and writes
// it back onto ev[groupKey], so nothing typed is lost before a re-render.
function syncTeamGroupFromDOM(ev, groupKey, wrapId){
  const wrap = document.getElementById(wrapId);
  const blocks = wrap.querySelectorAll('.admin-team');
  const updated = [];
  blocks.forEach(block=>{
    const nameInput = block.querySelector('[data-field="name"]');
    const membersInput = block.querySelector('[data-field="members"]');
    if(!nameInput || !membersInput) return;
    updated.push({
      id: nameInput.dataset.id,
      name: nameInput.value.trim() || "未命名隊伍",
      members: membersInput.value.split('\n').map(s=>s.trim()).filter(Boolean)
    });
  });
  ev[groupKey] = updated;
}

// ---------- navigation ----------
function showPublic(){
  document.getElementById('gateView').classList.add('hidden');
  document.getElementById('adminEventList').classList.add('hidden');
  document.getElementById('adminRosterEditor').classList.add('hidden');
  document.getElementById('publicFooter').classList.remove('hidden');
  if(currentEventId){ openEventDetail(currentEventId); } else { showEventList(); }
}
function showGate(){
  document.getElementById('publicEventList').classList.add('hidden');
  document.getElementById('publicEventDetail').classList.add('hidden');
  document.getElementById('publicFooter').classList.add('hidden');
  document.getElementById('adminEventList').classList.add('hidden');
  document.getElementById('adminRosterEditor').classList.add('hidden');
  document.getElementById('gateView').classList.remove('hidden');
  document.getElementById('pwInput').value = "";
  document.getElementById('pwError').textContent = "";
  document.getElementById('pwInput').focus();
}
function showAdminEvents(){
  editingState = JSON.parse(JSON.stringify(state));
  document.getElementById('publicEventList').classList.add('hidden');
  document.getElementById('publicEventDetail').classList.add('hidden');
  document.getElementById('publicFooter').classList.add('hidden');
  document.getElementById('gateView').classList.add('hidden');
  document.getElementById('adminRosterEditor').classList.add('hidden');
  document.getElementById('adminEventList').classList.remove('hidden');
  renderAdminEventList();
}

document.getElementById('logoHome').addEventListener('click', ()=>{
  document.getElementById('gateView').classList.add('hidden');
  document.getElementById('adminEventList').classList.add('hidden');
  document.getElementById('adminRosterEditor').classList.add('hidden');
  document.getElementById('publicFooter').classList.remove('hidden');

});
document.getElementById('toAdminBtn').addEventListener('click', showGate);
document.getElementById('backFromGate').addEventListener('click', showPublic);
document.getElementById('backFromAdminEvents').addEventListener('click', showPublic);
document.getElementById('backToEventsBtn').addEventListener('click', showEventList);
document.getElementById('backFromRosterEditor').addEventListener('click', ()=>{
  const ev = editingState.events.find(e=>e.id===currentAdminEventId);
  if(ev && ev.type === 'team'){
    syncTeamGroupFromDOM(ev, 'mainTeams', 'mainTeamsWrap');
    syncTeamGroupFromDOM(ev, 'backupTeams', 'backupTeamsWrap');
  } else if(ev && ev.type === 'individual'){
    ev.individualMain = document.getElementById('individualMainInput').value.split('\n').map(s=>s.trim()).filter(Boolean);
    ev.individualBackup = document.getElementById('individualBackupInput').value.split('\n').map(s=>s.trim()).filter(Boolean);
  }
  document.getElementById('adminRosterEditor').classList.add('hidden');
  document.getElementById('adminEventList').classList.remove('hidden');
  renderAdminEventList();
});

document.getElementById('pwSubmit').addEventListener('click', ()=>{
  const val = document.getElementById('pwInput').value;
  if(val === ADMIN_PASSWORD){ showAdminEvents(); }
  else{ document.getElementById('pwError').textContent = '密碼錯誤，請再試一次。'; }
});
document.getElementById('pwInput').addEventListener('keydown', e=>{
  if(e.key==='Enter') document.getElementById('pwSubmit').click();
});

document.getElementById('addEventBtn').addEventListener('click', ()=>{
  editingState.events.push({
    id: cryptoId(), name:"新賽事", date:"", type:"individual",
    individualMain:[], individualBackup:[], mainTeams:[], backupTeams:[]
  });
  renderAdminEventList();
});

document.getElementById('addMainTeamBtn').addEventListener('click', ()=>{
  const ev = editingState.events.find(e=>e.id===currentAdminEventId);
  if(!ev) return;
  syncTeamGroupFromDOM(ev, 'mainTeams', 'mainTeamsWrap');
  ev.mainTeams.push({ id: cryptoId(), name:"新隊伍", members:[] });
  renderTeamGroupEditor(ev, 'mainTeams', 'mainTeamsWrap');
});
document.getElementById('addBackupTeamBtn').addEventListener('click', ()=>{
  const ev = editingState.events.find(e=>e.id===currentAdminEventId);
  if(!ev) return;
  syncTeamGroupFromDOM(ev, 'backupTeams', 'backupTeamsWrap');
  ev.backupTeams.push({ id: cryptoId(), name:"新隊伍", members:[] });
  renderTeamGroupEditor(ev, 'backupTeams', 'backupTeamsWrap');
});

document.getElementById('saveEventsBtn').addEventListener('click', async ()=>{
  try{ await persist(editingState); showStatus('statusMsgEvents', '已儲存，公開頁面已同步更新。'); }
  catch(e){ showStatus('statusMsgEvents', '儲存失敗，請稍後再試。', true); }
});
document.getElementById('saveRosterBtn').addEventListener('click', async ()=>{
  const ev = editingState.events.find(e=>e.id===currentAdminEventId);
  if(ev && ev.type === 'individual'){
    ev.individualMain = document.getElementById('individualMainInput').value.split('\n').map(s=>s.trim()).filter(Boolean);
    ev.individualBackup = document.getElementById('individualBackupInput').value.split('\n').map(s=>s.trim()).filter(Boolean);
  } else if(ev && ev.type === 'team'){
    syncTeamGroupFromDOM(ev, 'mainTeams', 'mainTeamsWrap');
    syncTeamGroupFromDOM(ev, 'backupTeams', 'backupTeamsWrap');
  }
  try{ await persist(editingState); showStatus('statusMsgRoster', '已儲存，公開頁面已同步更新。'); }
  catch(e){ showStatus('statusMsgRoster', '儲存失敗，請稍後再試。', true); }
});

document.getElementById('eventSearchInput').addEventListener('input', e=>{
  renderEventList(e.target.value);
});
document.getElementById('teamSearchInput').addEventListener('input', e=>{
  const ev = state.events.find(x=>x.id===currentEventId);
  if(ev) renderRosterDisplay(ev, e.target.value);
});

loadData();
</script>
